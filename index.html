<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semora</title>
    <meta name="description" content="Semora - Academic performance tracker for engineering students." />
    <meta name="theme-color" content="#C27856" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  </head>
  <body class="min-h-screen">
    <div id="root" class="min-h-screen"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) { return s.replace(/~and~/g, '&') }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </body>
</html>
