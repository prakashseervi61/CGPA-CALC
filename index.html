<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Apex GPA - Minimalist Engineering SGPA & CGPA Calculator</title>
  <meta name="description" content="A clean, minimalist light-themed calculator for engineering student GPA/CGPA. Supporting SKCET IT curriculum, dynamic calculations, and instant storage.">
  
  <!-- Compiled Tailwind production CSS -->
  <link rel="stylesheet" href="assets/css/tailwind.css">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Minimalist Custom Stylesheet -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

  <!-- Premium Launch Screen Loader -->
  <div id="app-loader" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-slate-50 dark:bg-[#060814] transition-opacity duration-500 ease-out">
    <div class="flex flex-col items-center gap-4">
      <!-- Pulsing Brand Icon -->
      <div class="relative flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-500 shadow-xl shadow-blue-500/20 animate-pulse">
        <i class="fa-solid fa-graduation-cap text-white text-2xl"></i>
      </div>
      <!-- App Name & Subtitle -->
      <div class="text-center mt-2">
        <h2 class="text-lg font-extrabold text-slate-800 dark:text-slate-100 tracking-tight">Apex GPA</h2>
        <p class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mt-1">Preparing Curriculum...</p>
      </div>
      <!-- Infinite Bar Loader -->
      <div class="w-32 h-1 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden mt-2">
        <div class="h-full bg-blue-500 rounded-full w-full loader-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- Glassmorphism Navbar -->
  <header id="main-header" class="sticky top-0 z-50 w-full border-b border-white/10 dark:border-white/5 transition-shadow duration-300">
    <div class="w-full px-4 md:px-8 h-16 flex items-center justify-between">
      <h1 class="text-lg font-bold text-slate-900 dark:text-white logo-glow">Apex GPA</h1>

      <!-- Right Controls -->
      <div class="flex items-center space-x-2 md:space-x-3">
        <!-- Curriculum Select -->
        <div class="relative">
          <select id="curriculum-select" class="pl-8 pr-3 py-1.5 bg-white/70 dark:bg-slate-800/70 border border-slate-200/50 dark:border-slate-700/50 rounded-xl text-xs font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer backdrop-blur-md">
            <option value="skcet_it_24_28">SKCET IT (24-28)</option>
          </select>
          <i class="fa-solid fa-folder-open absolute left-2.5 top-2.5 text-slate-400 text-[10px]"></i>
        </div>

        <!-- Theme Switcher -->
        <button id="theme-toggle" class="p-2 rounded-xl hover:bg-white/50 dark:hover:bg-white/10 text-slate-500 dark:text-slate-400 transition-colors cursor-pointer" aria-label="Toggle dark theme">
          <i class="fa-solid fa-moon dark:hidden"></i>
          <i class="fa-solid fa-sun hidden dark:block text-amber-400"></i>
        </button>

        <!-- Global Reset -->
        <button id="global-reset-btn" class="p-2 rounded-xl hover:bg-rose-50/50 dark:hover:bg-rose-950/20 text-rose-500 transition-colors cursor-pointer" title="Reset All Data">
          <i class="fa-solid fa-rotate-left"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Container: Two-Column Layout -->
  <main class="flex-grow w-full px-4 md:px-8 py-6 h-0 overflow-hidden">
    <div class="flex flex-col md:flex-row gap-6 h-full">

      <!-- Left Panel (Dashboard & Overview) -->
      <div id="left-panel" class="left-panel w-full md:w-96 shrink-0 overflow-y-auto">
        <div id="left-panel-content"></div>
      </div>

      <!-- Right Panel (Active Semester Courses) -->
      <div id="right-panel" class="right-panel-scroll flex-1 min-w-0 overflow-hidden flex flex-col h-full mobile-hidden">
        <div id="right-panel-content" class="h-full flex flex-col overflow-hidden"></div>
      </div>

    </div>
  </main>

  <!-- Floating Bottom Nav for Mobile -->
  <div class="fixed bottom-5 left-1/2 -translate-x-1/2 z-40 w-[90%] max-w-xs md:hidden">
    <div class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-slate-200/50 dark:border-slate-800/50 rounded-2xl p-2 shadow-xl flex justify-around items-center">
      <button id="mobile-tab-dashboard" class="mobile-nav-btn active flex-1 py-1.5 cursor-pointer" aria-label="Show Dashboard">
        <i class="fa-solid fa-chart-simple text-lg"></i>
        <span>Dashboard</span>
      </button>
      <button id="mobile-tab-courses" class="mobile-nav-btn flex-1 py-1.5 cursor-pointer" aria-label="Show Courses">
        <i class="fa-solid fa-list-check text-lg"></i>
        <span>Courses</span>
      </button>
    </div>
  </div>

  <!-- Elegant Reset Modal -->
  <div id="reset-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/50 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
    <div class="minimal-card max-w-sm w-full p-6 shadow-2xl transform scale-95 transition-transform duration-300">
      <div class="text-center">
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-rose-50 dark:bg-rose-950/30 text-rose-500 mb-4">
          <i class="fa-solid fa-triangle-exclamation text-xl"></i>
        </div>
        <h3 class="text-base font-bold text-slate-950 dark:text-white mb-1">Reset Calculator Data?</h3>
        <p class="text-xs text-slate-500 dark:text-slate-400 mb-5">
          This will delete all entered grades and reset inputs. This action is permanent.
        </p>
        <div class="flex items-center gap-3">
          <button id="modal-cancel-btn" class="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 font-bold rounded-xl text-xs transition-colors cursor-pointer">
            Cancel
          </button>
          <button id="modal-confirm-btn" class="flex-1 py-2.5 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl text-xs transition-colors cursor-pointer">
            Confirm Reset
          </button>
        </div>
      </div>
    </div>
  </div>


  <!-- Core Scripts -->
  <script src="assets/js/curriculum.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
